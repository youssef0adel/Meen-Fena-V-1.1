# codemagic.yaml
workflows:
  android-debug:
    name: Build Android Debug APK
    environment:
      java: 17
      android_sdk: 33
    scripts:
      - name: Grant execute permission for gradlew
        script: chmod +x gradlew
      - name: Build debug APK
        script: ./gradlew assembleDebug
    artifacts:
      - app/build/outputs/apk/debug/*.apk
    cache:
      - ~/.gradle/caches
      - ~/.m2/repository
      - ~/.konan